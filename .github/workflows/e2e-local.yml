name: E2E — Local

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: e2e-local-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install test dependencies
        working-directory: puppeteer-tests
        run: npm ci

      - name: Cache node_modules and Puppeteer browsers
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            puppeteer-tests/node_modules
            ~/.cache/puppeteer
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'puppeteer-tests/package-lock.json') }}

  e2e:
    name: E2E local — ${{ matrix.suite }}
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        suite: [home, editor]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore node_modules and Puppeteer browsers
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            puppeteer-tests/node_modules
            ~/.cache/puppeteer
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'puppeteer-tests/package-lock.json') }}

      - name: Start dev server
        run: npm run start -- --open false &
        env:
          BROWSER: none
          VITE_E2E: "true"

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run ${{ matrix.suite }} tests
        working-directory: puppeteer-tests
        run: node --test tests/${{ matrix.suite }}.js
        env:
          TARGET: local

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug-${{ matrix.suite }}
          path: puppeteer-tests/screenshots/
          retention-days: 7
          if-no-files-found: ignore
