name: "Deploy Production"
on:
    push:
        branches:
            - master
jobs:
    deploy-prod:
        name: deploy-production
        runs-on: ubuntu-latest
        env:
            REACT_APP_DATABASE: PROD
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - name: Install Dependencies
              run: npm install
            - name: Install Rollup Linux Native Binary
              if: runner.os == 'Linux'
              run: |
                  ROLLUP_VERSION=$(node -e "const fs=require('fs'); const path=require('path'); const main=require.resolve('rollup'); const pkg=JSON.parse(fs.readFileSync(path.join(path.dirname(main), '..', 'package.json'),'utf8')); process.stdout.write(pkg.version)")
                  npm install --no-save @rollup/rollup-linux-x64-gnu@$ROLLUP_VERSION
            - name: Lint And Format Check
              run: |
                  npm run lint
                  npm run typecheck
                  npm run format:check
            - name: Build
              run: |
                  echo "STORAGE_BUCKET_URL=gs://csound-ide.appspot.com" >> functions/.env
                  PUBLIC_URL="https://ide.csound.com" PRODUCTION=1 npm run build
                  cp dist/index.html functions
                  cd functions
                  yarn install
                  yarn build
            - name: Deploy to Firebase
              uses: w9jds/firebase-action@master
              with:
                  args: deploy -P default
              env:
                  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_PROD }}
                  REACT_APP_DATABASE: PROD
