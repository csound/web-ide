name: E2E Tests with Puppeteer

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  e2e-remote:
    name: E2E — ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [dev, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: puppeteer-tests/package-lock.json

      - name: Install dependencies
        working-directory: puppeteer-tests
        run: npm ci

      - name: Run E2E tests
        working-directory: puppeteer-tests
        run: npm test
        env:
          TARGET: ${{ matrix.target }}

  e2e-local:
    name: E2E — local (PR changes)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install test dependencies
        working-directory: puppeteer-tests
        run: npm ci

      - name: Start dev server
        run: npm run start -- --open false &
        env:
          BROWSER: none

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run E2E tests against local server
        working-directory: puppeteer-tests
        run: npm test
        env:
          TARGET: local
