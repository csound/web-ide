name: E2E Tests with Puppeteer

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  e2e-local:
    name: E2E — local
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Install test dependencies
        working-directory: puppeteer-tests
        run: npm ci

      - name: Start dev server
        run: npm run start -- --open false &
        env:
          BROWSER: none

      - name: Wait for dev server
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run E2E tests against local server
        working-directory: puppeteer-tests
        run: npm test
        env:
          TARGET: local

  e2e-dev:
    name: E2E — dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: puppeteer-tests/package-lock.json

      - name: Install dependencies
        working-directory: puppeteer-tests
        run: npm ci

      - name: Run E2E tests against dev
        working-directory: puppeteer-tests
        run: npm test
        env:
          TARGET: dev

  e2e-prod:
    name: E2E — prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: puppeteer-tests/package-lock.json

      - name: Install dependencies
        working-directory: puppeteer-tests
        run: npm ci

      - name: Run E2E tests against prod
        working-directory: puppeteer-tests
        run: npm test
        env:
          TARGET: prod
