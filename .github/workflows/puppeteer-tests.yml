name: E2E Tests with Puppeteer

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Test target environment'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - dev
          - prod

jobs:
  e2e:
    name: E2E — ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: local
            condition: >-
              github.event_name == 'pull_request' ||
              (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'local')
          - target: dev
            condition: >-
              (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
              (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
          - target: prod
            condition: >-
              (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
              (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod')

    # Matrix-level 'if' doesn't support expressions from matrix values,
    # so each step checks the condition instead.
    steps:
      - uses: actions/checkout@v4
        if: ${{ matrix.condition }}

      - name: Set up Node.js
        if: ${{ matrix.condition }}
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.target == 'local' && 'package-lock.json' || 'puppeteer-tests/package-lock.json' }}

      - name: Install project dependencies
        if: ${{ matrix.condition && matrix.target == 'local' }}
        run: npm ci

      - name: Install test dependencies
        if: ${{ matrix.condition }}
        working-directory: puppeteer-tests
        run: npm ci

      - name: Start dev server
        if: ${{ matrix.condition && matrix.target == 'local' }}
        run: npm run start -- --open false &
        env:
          BROWSER: none

      - name: Wait for dev server
        if: ${{ matrix.condition && matrix.target == 'local' }}
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run E2E tests
        if: ${{ matrix.condition }}
        working-directory: puppeteer-tests
        run: npm test
        env:
          TARGET: ${{ matrix.target }}
